name: Update WorldCup26 data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest data
        env:
          WC26_TOKEN: ${{ secrets.WC26_TOKEN }}
          WC26_EMAIL: ${{ secrets.WC26_EMAIL }}
          WC26_PASSWORD: ${{ secrets.WC26_PASSWORD }}
        run: node tools/update-data.mjs

      - name: Commit if changed
        run: |
          git config user.name  "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/wc26.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update wc26 data [skip ci]"
            git push
          fi
